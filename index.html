<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Semaine — Todo Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login-screen">
    <h1>Ma Semaine</h1>
    <p>Ton planning personnel, toujours visible</p>
    <button id="login-btn" onclick="login()">Se connecter avec Microsoft</button>
</div>

<div id="loading">
    <div class="spinner"></div>
    Chargement des tâches...
</div>

<div id="dashboard">
    <div class="header">
        <h1>Ma Semaine</h1>
        <div class="header-actions">
            <button class="header-btn accent" onclick="openCreateModal()">+ Nouvelle tâche</button>
            <button class="header-btn" onclick="toggleCompleted()">Complétées</button>
            <button class="header-btn" onclick="toggleFilter()">Liste</button>
            <button class="header-btn" onclick="toggleTagFilter()">Tag</button>
            <button class="header-btn" onclick="toggleTagPanel()">Couleurs</button>
            <button class="header-btn" onclick="refreshTasks()">Rafraîchir</button>
            <button class="header-btn" onclick="logout()">Déconnexion</button>
        </div>
        <div class="filter-panel" id="filter-panel"></div>
        <div class="tag-panel" id="tag-panel"></div>
        <div class="tag-filter-panel" id="tag-filter-panel"></div>
    </div>
    <div class="nav-bar">
        <div class="nav-left">
            <button class="nav-btn" onclick="navigatePrev()" title="Précédent" aria-label="Période précédente">&#8249;</button>
            <button class="nav-btn" onclick="navigateNext()" title="Suivant" aria-label="Période suivante">&#8250;</button>
            <button class="nav-btn nav-today" id="nav-today-btn" onclick="navigateToday()" aria-label="Aller à aujourd'hui">Aujourd'hui</button>
            <span class="nav-label" id="nav-label"></span>
            <input type="text" id="search-input" class="search-input" placeholder="Rechercher..." aria-label="Rechercher une tâche">
        </div>
        <div class="nav-right">
            <button class="view-btn active" data-view="week" onclick="switchView('week')">Semaine</button>
            <button class="view-btn" data-view="month" onclick="switchView('month')">Mois</button>
        </div>
    </div>
    <div class="main">
        <div class="inbox" id="inbox-column" role="region" aria-label="Boîte de réception">
            <div class="column-header">Inbox</div>
            <div id="inbox-tasks"></div>
        </div>
        <div class="week-grid" id="week-grid" role="region" aria-label="Grille de tâches"></div>
        <div class="completed-sidebar" id="completed-sidebar">
            <div class="column-header">Complétées</div>
            <div id="completed-tasks"></div>
        </div>
    </div>
    <div class="footer">
        <span id="refresh-timer" aria-live="polite">Auto-refresh dans 15 min</span>
        <span id="last-update"></span>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
<script src="app.js"></script>
</body>
</html>
